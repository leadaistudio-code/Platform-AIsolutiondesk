# Local development infrastructure for AISOLUTIONDESK.
# Brings up Postgres, Redis, and Qdrant. Run: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: aisol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aisol
      POSTGRES_PASSWORD: aisol
      POSTGRES_DB: aisolutiondesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisol -d aisolutiondesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aisol-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aisol-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST + dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  redisdata:
  qdrantdata:
